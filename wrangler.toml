name = "newsletter-to-dropbox"
main = "src/index.js"
compatibility_date = "2025-05-19"
compatibility_flags = ["nodejs_compat"]

[vars]
DROPBOX_FOLDER = "/Apps/Rakuten Kobo"

# Comma-separated sender emails to accept. Omit to accept all.
# ALLOWED_SENDERS = "morningbrew@email.morningbrew.com,digest@example.com"

# Comma-separated sender emails to always reject.
# BLOCKED_SENDERS = "noreply@spam.com"

# Secrets — never put these here. Set them via:
#   wrangler secret put DROPBOX_ACCESS_TOKEN
# Or in Cloudflare dashboard → Worker → Settings → Variables & Secrets

[build]
command = "npm install"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
